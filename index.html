<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <link rel="icon" type="image/jpeg" href="barcodeicon.jpg">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>

<body>

    <div class="container">

        <h1>Barcode Generator</h1>

        <!-- Barcode Range -->
        <div class="section">

            <h2>Barcode Range</h2>

            <div class="grid">

                <div>
                    <label>Prefix</label>
                    <input type="text" id="prefix" placeholder="ABC">
                </div>

                <div>
                    <label>Start Number</label>
                    <input type="number" id="start" value="0">
                </div>

                <div>
                    <label>End Number</label>
                    <input type="number" id="end" value="0">
                </div>

                <div>
                    <label>Increment</label>
                    <input type="number" id="step" value="1">
                </div>

            </div>

        </div>

        <!-- Advanced Settings Button -->

        <button class="toggle-btn" id="toggleSettings" onclick="toggleSettings()">
            ▼ Advanced Settings
        </button>

        <!-- Advanced Settings -->

        <div id="advancedSettings" class="hidden-settings">

            <!-- Barcode Settings -->

            <div class="section">

                <h2>Barcode Settings</h2>

                <div class="grid">

                    <div>
                        <label>Bar Thickness (px)</label>
                        <input type="number" id="barWidth" value="1" step="0.1">
                    </div>

                    <div>
                        <label>Barcode Height (px)</label>
                        <input type="number" id="barHeight" value="36">
                    </div>

                    <div>
                        <label>Barcode Margin (px)</label>
                        <input type="number" id="barMargin" value="1">
                    </div>

                </div>

            </div>

            <!-- Label Settings -->

            <div class="section">

                <h2>Label Settings</h2>

                <div class="grid">

                    <div>
                        <label>Label Size (px)</label>
                        <input type="number" id="labelSize" value="150">
                    </div>

                    <div>
                        <label>Border Thickness (px)</label>
                        <input type="number" id="borderThickness" value="1">
                    </div>

                    <div>
                        <label>Gap Between Labels (px)</label>
                        <input type="number" id="gap" value="0">
                    </div>

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button onclick="generateBarcode()">
                Generate Barcodes
            </button>

            <button onclick="clearLabels()">
                Clear
            </button>

            <button onclick="window.print()">
                Print
            </button>

        </div>

        <!-- Generated Labels -->

        <div id="labels"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>

<footer>
    Built by Nayab Samad
</footer>
